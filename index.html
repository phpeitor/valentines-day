<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='75'>❤️</text></svg>" />
  <title>Valentine's Day</title>
  <link rel='stylesheet' href='./css/style.css'>
</head>

<body>
  <div class="valentine">😍❤️</div>
  <div class="valentine-script">My Valentine</div>
  <div class="valentine-name" id="valentine-name"></div>

  <form class="valentine-form" id="valentine-form">
    <input class="valentine-input" id="name-input" type="text" name="name" placeholder="Escribe un nombre"
      autocomplete="name" maxlength="50" pattern="\S+" required />
    <button class="valentine-button" type="submit">Enviar</button>
  </form>

  <div class="background-widget" aria-label="Seleccionar efecto de fondo">
    <button class="background-option is-active" type="button" data-background="hearts" aria-pressed="true">Hearts</button>
    <button class="background-option" type="button" data-background="sparkles" aria-pressed="false">Sparkles</button>
    <button class="background-option" type="button" data-background="bubbles" aria-pressed="false">Bubbles</button>
  </div>

  <css-doodle id="valentine-doodle"></css-doodle>

  <script src='./js/script.js'></script>
  <script src='./js/doodle.js'></script>
  <script src='./js/valentine-form.js'></script>
  <script src='./js/background-options.js'></script>
</body>

</html>
